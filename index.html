<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8"/>
		<title>AI Watermark Checker • C2PA & EXIF Metadata Analyzer</title>
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<meta name="description" content="Detects AI watermarks (C2PA), EXIF, XMP and other metadata in images. All processing happens locally in your browser. Includes tool to remove metadata and export a clean version."/>
		<meta name="robots" content="index,follow"/>
		<meta name="google-site-verification" content="KaMK7N1HOMUVsZtnY2qxO2ksQtXnO_poSNz22CTJGeo" />
		<link rel="canonical" href="https://mspnetdev.github.io/AI-WatermarkVerify/"/>
		<style>
    :root{
      --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --muted:#9ca3af;
      --ok:#059669; --warn:#f59e0b; --bad:#dc2626; --yellow:#eab308;
      --border:#1f2937; --chip:#0b1222; --drop:#1e40af; --focus:#475569;
    }
    * { box-sizing: border-box; }
    body{
      margin:0; font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg); color:var(--text);
    }
    header{
      padding:20px; border-bottom:1px solid var(--border);
      background:linear-gradient(180deg,#0f172a,#0f172a 70%,#0b1222);
    }
    h1{margin:0 0 6px 0; font-size:20px}
    p.sub{margin:0; color:var(--muted); font-size:14px}

    main{ max-width:980px; margin:24px auto; padding:0 16px 40px; }
    .stack{ max-width:720px; margin:0 auto; display:flex; flex-direction:column; gap:16px; }

    .card{
      background:var(--panel); border:1px solid var(--border);
      border-radius:12px; padding:16px;
    }

    /* KV (Result / Indicators / File size) */
    .kvs{ display:grid; grid-template-columns:160px 1fr; gap:8px 16px; font-size:14px; }
    .kvs div:nth-child(odd){ color:var(--muted); }

    /* PREVIEW */
    #previewContainer{ width:100%; max-width:640px; margin:0 auto; }
    .preview, .preview-placeholder{
      width:100%; aspect-ratio:16/9; border-radius:8px;
      border:1px solid #334155; background:#0b1222; cursor:pointer;
    }
    .preview{ display:none; object-fit:cover; }
    .preview-placeholder{
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      color:#64748b; border-style:dashed; transition:.2s;
    }
    .preview-placeholder:hover{ background:#111827; border-color:var(--focus); color:#cbd5e1; }
    .preview-placeholder svg{ width:56px; height:56px; margin-bottom:10px; stroke:#475569; }

    .preview:focus, .preview-placeholder:focus, .btn:focus{
      outline:2px solid var(--focus); outline-offset:2px;
    }

    /* Progress sottile */
    .progress{ width:100%; height:6px; border-radius:999px; background:#0b1222; border:1px solid #334155; overflow:hidden; margin-top:10px; }
    .progress-bar{ width:0%; height:100%; background:linear-gradient(90deg,#22c55e,#eab308); transition:width .3s ease; }

    /* Azioni */
    .actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; align-items:center; }
    .btn{
      display:inline-flex; align-items:center; gap:8px; padding:10px 14px;
      border-radius:8px; border:1px solid #334155; background:#0b1222; color:var(--text); cursor:pointer; transition:opacity .2s ease;
    }
    .btn:disabled{ opacity:.5; cursor:not-allowed; }
    .btn-green{ color:var(--ok)!important }
    .btn-orange{ color:var(--warn)!important }
    .btn-red{ color:var(--bad)!important }
    .btn-yellow{ color:var(--yellow)!important }
    .btn-danger{ background:#7f1d1d; border-color:#b91c1c; }

    .chips{ display:flex; gap:8px; flex-wrap:wrap; }
    .chip{ background:#0b1222; border:1px solid #334155; color:#93c5fd; padding:4px 8px; border-radius:999px; font-size:12px; }

    pre{
      margin:0; padding:12px; background:#0b1222; border:1px solid #334155; border-radius:8px;
      color:#d1d5db; overflow:auto; max-height:300px; white-space:pre; font-size:12px;
    }

    /* Drag overlay */
    .drop-overlay{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(30,64,175,.15); border:3px dashed var(--drop); pointer-events:none; z-index:999;
      color:#dbeafe; font-weight:700; font-size:18px;
    }
    .drop-overlay.show{ display:flex; }

    /* Nascondi input file e stile drag attivo */
    #file{ display:none; }
    .drop-over{ outline:2px dashed var(--drop); outline-offset:6px; box-shadow:0 0 0 4px rgba(30,64,175,.25) inset; }
  </style>
	</head>
	<body>
		<header>
			<h1>Detects watermark on AI-generated images and removes it with client-side processing only</h1>
			<p class="sub">AI Watermark / Provenance Checker (C2PA + EXIF)</p>
		</header>
		<main>
			<div class="stack">
				<!-- 1) KV INFO -->
				<section class="card">
					<div class="kvs">
						<div>Result</div>
						<div id="decision">—</div>
						<div>Indicators</div>
						<div class="chips" id="indicators"/>
						<div>File size</div>
						<div id="fileInfo">—</div>
					</div>
				</section>
				<!-- 2) IMMAGINE + 3) PROGRESS + 4) AZIONI -->
				<section id="dropCard" class="card">
					<input id="file" type="file" accept="image/*"/>
					<div id="previewContainer">
						<div id="previewPlaceholder" class="preview-placeholder" title="Drop an image or click to select" tabindex="0" role="button" aria-label="Select image">
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" aria-hidden="true">
								<path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5v-9m0 0l-3 3m3-3l3 3M3 9.75v8.25A2.25 2.25 0 005.25 20.25h13.5A2.25 2.25 0 0021 18V9.75M3 9.75L12 4.5l9 5.25"/>
							</svg>
							<div>Drag & Drop your image<br>or click to upload</div>
							</div>
							<img id="preview" class="preview" alt="Preview"/>
						</div>
						<div class="progress" aria-hidden="true">
							<div id="progressBar" class="progress-bar"/>
						</div>
						<div class="actions">
							<button id="analyzeBtn" class="btn" disabled>No file< button>
							<button id="stripBtn" class="btn btn-danger" disabled>Remove metadata & save< button>
						</div>
					</section>
					<!-- 5) PANNELLI -->
					<section class="card">
						<h3 style="margin:0 0 8px 0; font-size:15px;">Content Credentials / C2PA</h3>
						<pre id="c2paJson">—</pre>
					</section>
					<section class="card">
						<h3 style="margin:0 0 8px 0; font-size:15px;">EXIF / XMP Metadata</h3>
						<pre id="exifJson">—</pre>
					</section>
				</div>
			</main>
			<div id="dropOverlay" class="drop-overlay">Drop here to analyze image</div>
			<!-- Librerie -->
			<script src="https://cdn.jsdelivr.net/npm/exifreader@4.32.0/dist/exif-reader.min.js"/>
			<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"/>
			<!-- App logic -->
			<script type="module">
    import { createC2pa } from "https://cdn.jsdelivr.net/npm/@contentauth/c2pa-web@0.5.7/+esm";

    // --------- DOM refs
    const $ = (id) => document.getElementById(id);
    const dropCard = $('dropCard'), dropOverlay = $('dropOverlay');
    const fileInput = $('file'), analyzeBtn = $('analyzeBtn'), stripBtn = $('stripBtn');
    const preview = $('preview'), placeholder = $('previewPlaceholder');
    const decision = $('decision'), indicators = $('indicators'), fileInfo = $('fileInfo');
    const c2paJson = $('c2paJson'), exifJson = $('exifJson'), progressBar = $('progressBar');

    // --------- State
    let currentFile = null, currentURL = null;
    const state = { c2pa:false, exif:false };

    // --------- EmailJS (opzionale)
    const EMAILJS_PUBLIC_KEY = "v_GEsPIWl1P9WDohS";
    const EMAILJS_SERVICE_ID = "service_c4hb459";
    const EMAILJS_TEMPLATE_ID = "template_v4fxnsc";
    if (window.emailjs && EMAILJS_PUBLIC_KEY) {
      window.emailjs.init(EMAILJS_PUBLIC_KEY);
    }

    // --------- C2PA init
    const c2pa = await createC2pa({
      wasmSrc:"https://cdn.jsdelivr.net/npm/@contentauth/c2pa-web@0.5.7/dist/resources/c2pa_bg.wasm"
    });

    // --------- Helpers UI
    const setBtn = (text, cls=null) => {
      analyzeBtn.textContent = text;
      analyzeBtn.className = "btn" + (cls ? " " + cls : "");
    };
    const showPlaceholder = () => { preview.style.display="none"; placeholder.style.display="flex"; };
    const showPreview = () => { placeholder.style.display="none"; preview.style.display="block"; };
    const progress = (pct, ms=300) => { progressBar.style.transitionDuration = ms+"ms"; progressBar.style.width = pct+"%"; };
    const resetURL = () => { if(currentURL){ URL.revokeObjectURL(currentURL); currentURL=null; } };

    const resetUI = () => {
      setBtn("No file");
      analyzeBtn.disabled = true; stripBtn.disabled = true;
      decision.textContent = "—"; indicators.innerHTML = ""; fileInfo.textContent = "—";
      c2paJson.textContent = "—"; exifJson.textContent = "—";
      state.c2pa = state.exif = false; progress(0,0); showPlaceholder(); resetURL();
    };

    // --------- File handling
    function loadFile(file){
      resetUI();
      currentFile = file || null; if(!currentFile) return;

      setBtn("Ready to analyze","btn-green"); analyzeBtn.disabled = false;
      currentURL = URL.createObjectURL(currentFile);
      preview.src = currentURL; preview.alt = `Preview: ${currentFile.name}`; showPreview();
      fileInfo.textContent = `${(currentFile.size/1024).toFixed(1)} KB • ${currentFile.type || 'Unknown MIME'}`;
    }

    // Apri picker da click/Enter
    const openPicker = () => fileInput.click();
    placeholder.addEventListener("click", openPicker);
    placeholder.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openPicker(); }});
    preview.addEventListener("click", openPicker);
    fileInput.addEventListener("change", ()=> loadFile(fileInput.files?.[0] || null));

    // Drag & drop (compatto)
    const isFileDrag = (e) => {
      const dt = e.dataTransfer; if(!dt) return false;
      return (dt.types?.includes?.("Files") || dt.types?.[0]==="Files" || [...(dt.items||[])].some(i=>i.kind==="file"));
    };
    const prevent = (e)=>{ e.preventDefault(); e.stopPropagation(); };
    ["dragenter","dragover"].forEach(ev=>{
      window.addEventListener(ev, e=>{ if(!isFileDrag(e)) return; prevent(e); dropOverlay.classList.add("show"); dropCard.classList.add("drop-over"); });
    });
    ["dragleave","drop"].forEach(ev=>{
      window.addEventListener(ev, e=>{ if(!isFileDrag(e)) return; prevent(e); dropOverlay.classList.remove("show"); dropCard.classList.remove("drop-over"); });
    });
    const onDrop = (e)=>{ if(!isFileDrag(e)) return; prevent(e); loadFile(e.dataTransfer.files?.[0] || null); };
    dropCard.addEventListener("dragover", e=>{ if(isFileDrag(e)) prevent(e); });
    dropCard.addEventListener("dragenter", e=>{ if(isFileDrag(e)) prevent(e); });
    dropCard.addEventListener("drop", onDrop);
    window.addEventListener("drop", onDrop);

    // --------- Analyze
    analyzeBtn.addEventListener("click", async ()=>{
      if(!currentFile) return;
      setBtn("Analyzing…","btn-orange"); analyzeBtn.disabled = true; stripBtn.disabled = true;
      indicators.innerHTML = ""; c2paJson.textContent = "—"; exifJson.textContent = "—"; decision.textContent = "—";
      state.c2pa = state.exif = false; progress(25);

      // C2PA
      try{
        const reader = await c2pa.reader.fromBlob(currentFile.type, currentFile);
        const manifest = await reader.manifestStore();
        if(manifest){ c2paJson.textContent = JSON.stringify(manifest,null,2); state.c2pa = true; }
        else c2paJson.textContent = "No C2PA manifest found.";
        await reader.free?.();
      }catch(e){ c2paJson.textContent = "C2PA read error: " + e; }
      progress(60);

      // EXIF
      try{
        const tags = await ExifReader.load(currentFile);
        const filtered = {};
        ["Software","CreatorTool","Xmp","Model","Make"].forEach(k=>{ if(tags[k]) filtered[k]=tags[k]; });
        exifJson.textContent = Object.keys(filtered).length ? JSON.stringify(filtered,null,2) : "(no relevant tags)";
        if(Object.keys(filtered).length) state.exif = true;
      }catch(e){ exifJson.textContent = "EXIF read error: " + e; }
      progress(90);

      if(state.c2pa) indicators.insertAdjacentHTML("beforeend", `<span class="chip">C2PA present</span>`);
      if(state.exif) indicators.insertAdjacentHTML("beforeend", `<span class="chip">EXIF/XMP present</span>`);

      if(state.c2pa || state.exif){ decision.textContent = "Metadata detected in the image."; setBtn("Metadata detected","btn-red"); stripBtn.disabled = false; }
      else { decision.textContent = "No metadata detected."; setBtn("No metadata","btn-green"); }

      progress(100); setTimeout(()=>progress(0,0), 1200);
      analyzeBtn.disabled = false;
    });

    // --------- Export pulito mantenendo formato originale
    async function exportClean(file){
      const mime = file.type || "image/png"; // fallback di sicurezza
      const img = new Image();
      img.src = URL.createObjectURL(file);
      await img.decode();

      const canvas = document.createElement("canvas");
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext("2d").drawImage(img,0,0);
      URL.revokeObjectURL(img.src);

      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), mime);
      });
    }

    async function sendMailOnSave(fileName){
      try{
        const ej = window.emailjs;
        if(!(ej && ej.send && EMAILJS_PUBLIC_KEY && EMAILJS_SERVICE_ID && EMAILJS_TEMPLATE_ID)) return;
        await ej.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email: "msp.netdev@gmail.com",
          subject: "Clean image exported",
          message: `A clean image has been exported: ${fileName}`,
          filename: fileName,
          exported_at: new Date().toISOString()
        });
      }catch(err){ console.warn("EmailJS error:", err); }
    }

    // --------- Strip + save + email (mantiene estensione originale)
    stripBtn.addEventListener("click", async ()=>{
      if(!currentFile) return;
      stripBtn.disabled = true; setBtn("Removing metadata…","btn-orange"); progress(35);

      // Blob pulito nello stesso formato dell'input
      const cleanBlob = await exportClean(currentFile);

      // Nome: <originale>-clean.<estensione>
      const base = currentFile.name.replace(/\.[^/.]+$/, "");
      const ext  = (currentFile.name.split('.').pop() || 'png').toLowerCase();
      const cleanName = `${base}-clean.${ext}`;

      // Download
      const a = document.createElement("a");
      a.href = URL.createObjectURL(cleanBlob);
      a.download = cleanName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=> URL.revokeObjectURL(a.href), 0);

      // Email (opzionale)
      await sendMailOnSave(cleanName);

      setBtn("Clean image exported","btn-yellow"); stripBtn.disabled = false;
      progress(100); setTimeout(()=>progress(0,0), 1200);
    });

    // Reset iniziale
    resetUI();
  </script>
				</body>
			</html>
